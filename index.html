<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🗳 मतदार यादी 2002 — SIR Dhule</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0f0c29;
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  min-height: 100vh;
  padding: 20px 12px 40px;
}

/* ── HEADER ── */
.header {
  text-align: center;
  color: #fff;
  margin-bottom: 28px;
}
.header .badge {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #c9d6ff;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 14px;
}
.header h1 {
  font-size: clamp(22px, 5vw, 34px);
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(90deg, #c9d6ff, #e2a4f3, #f9c8a1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.header p {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.3px;
}

/* ── CARD ── */
.card {
  max-width: 680px;
  margin: 0 auto 24px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 24px;
}

/* ── SEARCH BAR ── */
.search-wrap {
  display: flex;
  gap: 10px;
  align-items: stretch;
}
.search-wrap input {
  flex: 1;
  padding: 14px 18px;
  font-size: 16px;
  border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: #fff;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.search-wrap input::placeholder { color: rgba(255,255,255,0.35); }
.search-wrap input:focus {
  border-color: rgba(201,214,255,0.5);
  background: rgba(255,255,255,0.12);
}
.search-wrap button {
  padding: 14px 22px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  flex-shrink: 0;
}
.search-wrap button:hover { opacity: 0.88; }
.search-wrap button:active { transform: scale(0.96); }

/* ── INSTRUCTION BOX ── */
.instruction {
  margin-top: 16px;
  background: rgba(255, 200, 100, 0.08);
  border: 1px solid rgba(255, 200, 100, 0.2);
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.instruction .icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.instruction-text { font-size: 13px; color: rgba(255,220,130,0.9); line-height: 1.6; }
.instruction-text strong { color: #fde68a; font-size: 14px; }
.instruction-text .example { margin-top: 6px; font-size: 12px; color: rgba(255,220,130,0.65); }
.instruction-text .example span { color: #86efac; font-weight: 600; }
.instruction-text .example .wrong { color: #fca5a5; text-decoration: line-through; }

/* ── TIPS ── */
.tips {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.tip {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 4px 12px;
}

/* ── STATUS ── */
#status {
  max-width: 680px;
  margin: 0 auto 16px;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  text-align: center;
  min-height: 20px;
}
#status b { color: #c9d6ff; }
#status i { color: rgba(255,255,255,0.7); }

/* ── RESULTS ── */
.results-wrap { max-width: 680px; margin: 0 auto; }

.result-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: transform 0.15s, border-color 0.15s;
}
.result-card:hover {
  transform: translateY(-1px);
  border-color: rgba(201,214,255,0.25);
}
.result-card.exact { border-left: 3px solid #4ade80; }
.result-card.fuzzy { border-left: 3px solid #fb923c; }

/* Meta strip */
.meta-strip {
  display: flex;
  gap: 8px;
  padding: 10px 14px 0;
  flex-wrap: wrap;
  align-items: center;
}
.meta-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 4px 10px;
}
.meta-pill .label {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.meta-pill .value {
  font-weight: 700;
  font-size: 12px;
}
.meta-pill.ac   .value { color: #86efac; }
.meta-pill.part .value { color: #fde68a; }
.meta-pill.sr   .value { color: #f9a8d4; }

.match-badge {
  margin-left: auto;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 9px;
  border-radius: 6px;
}
.exact .match-badge { background: rgba(74,222,128,0.15); color: #4ade80; }
.fuzzy .match-badge { background: rgba(251,146,60,0.15);  color: #fb923c; }

/* Name line */
.name-line {
  padding: 10px 14px 12px;
  font-size: 15px;
  color: rgba(255,255,255,0.88);
  line-height: 1.7;
  word-break: break-word;
}
mark {
  background: rgba(255,224,100,0.3);
  color: #ffe064;
  border-radius: 3px;
  padding: 0 2px;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: rgba(255,255,255,0.3);
}
.empty .icon { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="badge">Maharashtra Electoral Roll</div>
  <h1>🗳 मतदार यादी 2002</h1>
  <p>SIR Dhule — मतदाराचे नाव शोधा</p>
</div>

<div class="card">
  <div class="search-wrap">
    <input id="q"
      placeholder="इथे नाव टाका… उदा. राजेश पाटील"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <button onclick="search()" title="शोधा">🔍</button>
  </div>

  <!-- Instruction box -->
  <div class="instruction">
    <div class="icon">⚠️</div>
    <div class="instruction-text">
      <strong>फक्त मराठी भाषेत नाव टाका</strong><br>
      नाव शोधताना मराठी (देवनागरी) अक्षरातच टाइप करा.
      <div class="example">
        ✅ बरोबर: <span>राजेश पाटील</span> &nbsp;|&nbsp; <span>विनोद कदम</span><br>
        ❌ चुकीचे: <span class="wrong">Rajesh Patil</span> &nbsp;|&nbsp; <span class="wrong">Vinod Kadam</span>
      </div>
    </div>
  </div>

  <!-- Vowel-pair tips -->
  <div class="tips">
    <span class="tip">💡 विनोद = वीनोद</span>
    <span class="tip">सुरज = सूरज</span>
    <span class="tip">इ = ई &nbsp;ढूंढता है</span>
    <span class="tip">उ = ऊ &nbsp;ढूंढता है</span>
  </div>
</div>

<div id="status"></div>
<div class="results-wrap" id="results"></div>

<script>
// ═══════════════════════════════════════════════════
// VOWEL NORMALISATION — only इ↔ई and उ↔ऊ
// All search happens purely in Devanagari.
// No Roman conversion is exposed to the user.
// ═══════════════════════════════════════════════════
function normalizeDevaVowels(str) {
  return str
    .replace(/\u0908/g, '\u0907')  // ई → इ
    .replace(/\u090A/g, '\u0909')  // ऊ → उ
    .replace(/\u0940/g, '\u093F')  // ी → ि  (matra)
    .replace(/\u0942/g, '\u0941'); // ू → ु  (matra)
}

// ═══════════════════════════════════════════════════
// INTERNAL DEVANAGARI → ROMAN
// Used ONLY to build the consonant skeleton for
// phonetic fuzzy matching. Never shown to the user.
// ═══════════════════════════════════════════════════
const DEVA_MAP = {
  '\u0915':'k','\u0916':'kh','\u0917':'g','\u0918':'gh','\u0919':'ng',
  '\u091A':'ch','\u091B':'chh','\u091C':'j','\u091D':'jh','\u091E':'ny',
  '\u091F':'t','\u0920':'th','\u0921':'d','\u0922':'dh','\u0923':'n',
  '\u0924':'t','\u0925':'th','\u0926':'d','\u0927':'dh','\u0928':'n',
  '\u092A':'p','\u092B':'ph','\u092C':'b','\u092D':'bh','\u092E':'m',
  '\u092F':'y','\u0930':'r','\u0932':'l','\u0935':'v',
  '\u0936':'sh','\u0937':'sh','\u0938':'s','\u0939':'h',
  '\u0933':'l','\u0931':'r',
  '\u0905':'a','\u0906':'a',
  '\u0907':'i','\u0909':'u',
  '\u090F':'e','\u0910':'e','\u0913':'o','\u0914':'o','\u090B':'ri',
  '\u093E':'a','\u093F':'i','\u0941':'u',
  '\u0947':'e','\u0948':'e','\u094B':'o','\u094C':'o','\u0943':'ri',
  '\u094D':'','\u0902':'n','\u0903':'h','\u0901':'n','\u093C':'',
  '\u0966':'0','\u0967':'1','\u0968':'2','\u0969':'3','\u096A':'4',
  '\u096B':'5','\u096C':'6','\u096D':'7','\u096E':'8','\u096F':'9',
};
function _devaToRoman(str) {
  let out = '';
  for (const ch of str) out += (DEVA_MAP[ch] !== undefined ? DEVA_MAP[ch] : ch);
  return out;
}

// ═══════════════════════════════════════════════════
// PHONETIC KEY (internal only — consonant skeleton)
// Input: a Devanagari word (already vowel-normalised)
// Output: consonant-only Roman skeleton for fuzzy diff
// ═══════════════════════════════════════════════════
function phoneticKey(devaWord) {
  // normalise vowels first, then convert internally
  let s = _devaToRoman(normalizeDevaVowels(devaWord.toLowerCase()));
  // merge consonant clusters
  s = s
    .replace(/chh/g,'c').replace(/ch/g,'c')
    .replace(/kh/g,'k') .replace(/gh/g,'g')
    .replace(/ph/g,'f') .replace(/bh/g,'b')
    .replace(/dh/g,'d') .replace(/th/g,'t')
    .replace(/sh/g,'s') .replace(/ng/g,'n')
    .replace(/ny/g,'n') .replace(/ri/g,'r')
    .replace(/q/g,'k').replace(/z/g,'j')
    .replace(/x/g,'ks').replace(/w/g,'v');
  s = s.replace(/[aeiou]/g,'');  // strip vowels
  s = s.replace(/[^a-z]/g,'');   // keep a-z only
  s = s.replace(/(.)\1+/g,'$1'); // collapse runs
  return s;
}

function allowedEdits(len) {
  if (len <= 3) return 0;
  if (len <= 6) return 1;
  return 2;
}

// ═══════════════════════════════════════════════════
// LEVENSHTEIN
// ═══════════════════════════════════════════════════
function levenshtein(a, b) {
  if (a === b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  let prev = Array.from({length: b.length+1}, (_,j) => j);
  for (let i = 1; i <= a.length; i++) {
    const curr = [i];
    for (let j = 1; j <= b.length; j++) {
      curr[j] = a[i-1]===b[j-1] ? prev[j-1] : 1+Math.min(prev[j],curr[j-1],prev[j-1]);
    }
    prev = curr;
  }
  return prev[b.length];
}

function tokenMatches(qK, recKeys) {
  if (!qK) return true;
  const thresh = allowedEdits(qK.length);
  for (const rk of recKeys) {
    if (!rk) continue;
    if (Math.abs(qK.length - rk.length) > thresh) continue;
    if (levenshtein(qK, rk) <= thresh) return true;
  }
  return false;
}

function longNameMatch(qKeys, recKeys) {
  if (qKeys.length < 2) return false;
  const qSkel = qKeys.join('');
  const rSkel = recKeys.join('');
  if (!qSkel || qSkel.length < 4) return false;
  if (rSkel.includes(qSkel)) return true;
  const wLen = qSkel.length;
  const thresh = allowedEdits(wLen);
  if (rSkel.length >= wLen) {
    for (let i = 0; i <= rSkel.length - wLen; i++) {
      if (levenshtein(qSkel, rSkel.slice(i, i+wLen)) <= thresh) return true;
    }
  } else {
    if (levenshtein(qSkel, rSkel) <= allowedEdits(rSkel.length)) return true;
  }
  return false;
}

// ═══════════════════════════════════════════════════
// HIGHLIGHT
// ═══════════════════════════════════════════════════
function highlight(text, terms) {
  let out = text;
  for (const t of terms) {
    if (!t || t.length < 2) continue;
    const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    out = out.replace(re,'<mark>$&</mark>');
  }
  return out;
}

// ═══════════════════════════════════════════════════
// RENDER CARD
//
// AC No.   : always 89
// Part No. : first 3 chars of rec.file
// Sr No.   : first WORD of the result line
// ═══════════════════════════════════════════════════
function renderCard(rec, text, matchClass, matchLabel, qTokens) {
  // Part No. — first 3 characters of rec.file
  const partNo = (rec.file || '').substring(0, 3);

  // Sr No. — first whitespace-separated word of the text line
  const srNo = (text || '').trim().split(/\s+/)[0] || '';

  const body = matchClass === 'exact'
    ? highlight(text, qTokens)
    : text;

  return `
  <div class="result-card ${matchClass}">
    <div class="meta-strip">
      <div class="meta-pill ac">
        <span class="label">AC No.</span>
        <span class="value">89</span>
      </div>
      <div class="meta-pill part">
        <span class="label">Part No.</span>
        <span class="value">${partNo}</span>
      </div>
      <div class="meta-pill sr">
        <span class="label">Sr No.</span>
        <span class="value">${srNo}</span>
      </div>
      <span class="match-badge">${matchLabel}</span>
    </div>
    <div class="name-line">${body}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// MAIN SEARCH — Devanagari only
//
// Layer 1 : exact substring match (after vowel normalisation)
// Layer 2 : vowel-pair normalised substring
//           (विनोद finds वीनोद, सुरज finds सूरज)
// Layer 3a: token-by-token phonetic/fuzzy
// Layer 3b: long compound-name skeleton match
// ═══════════════════════════════════════════════════
let data = [];

function search() {
  const raw = document.getElementById("q").value.trim();
  if (!raw) return;

  // Tokenise in original Devanagari
  const qTokens     = raw.toLowerCase().split(/\s+/).filter(Boolean);

  // Vowel-normalised tokens (इ=ई, उ=ऊ) — still Devanagari
  const qNormTokens = qTokens.map(t => normalizeDevaVowels(t));

  // Internal phonetic keys (consonant skeletons, never shown to user)
  const qKeys       = qTokens.map(phoneticKey);
  const hasKey      = qKeys.some(k => k.length >= 2);

  const exactList    = [];
  const phoneticList = [];

  data.forEach(rec => {
    const text    = rec.text || '';
    const textLow = text.toLowerCase();

    // ── Layer 1: exact substring in original Devanagari ─────
    if (qTokens.every(t => textLow.includes(t))) {
      exactList.push({ rec, text });
      return;
    }

    // Vowel-normalised version of the record (Devanagari, not Roman)
    const textNorm = normalizeDevaVowels(textLow);

    // ── Layer 2: vowel-pair normalised substring ─────────────
    // After collapsing ई→इ and ऊ→उ in both query and record,
    // विनोद and वीनोद become the same string → exact substring hit.
    if (qNormTokens.every(nt => nt.length > 0 && textNorm.includes(nt))) {
      phoneticList.push({ rec, text, badge: '🔤 स्वर-साम्य' });
      return;
    }

    if (!hasKey) return;

    // Pre-compute record's word phonetic keys
    const recWords = textLow.split(/\s+/).filter(Boolean);
    const recKeys  = recWords.map(phoneticKey);

    // ── Layer 3a: token-by-token phonetic match ───────────────
    if (qKeys.every(qk => tokenMatches(qk, recKeys))) {
      phoneticList.push({ rec, text, badge: '🔀 ध्वनि-साम्य' });
      return;
    }

    // ── Layer 3b: long compound-name skeleton match ───────────
    if (longNameMatch(qKeys, recKeys)) {
      phoneticList.push({ rec, text, badge: '🔀 ध्वनि-साम्य' });
    }
  });

  // Render
  let html = '';
  exactList.forEach(({ rec, text }) => {
    html += renderCard(rec, text, 'exact', '✅ हुबेहूब', qTokens);
  });
  phoneticList.forEach(({ rec, text, badge }) => {
    html += renderCard(rec, text, 'fuzzy', badge, qTokens);
  });

  const total = exactList.length + phoneticList.length;

  document.getElementById("results").innerHTML = html ||
    `<div class="empty">
      <div class="icon">🔍</div>
      <p>कोणतेही परिणाम सापडले नाहीत<br>
         "<b>${raw}</b>" हे नाव यादीत आढळले नाही.</p>
     </div>`;

  document.getElementById("status").innerHTML = total
    ? `<b>${total}</b> निकाल सापडले — ${exactList.length} हुबेहूब, ${phoneticList.length} ध्वनि-साम्य — "<i>${raw}</i>"`
    : '';
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById("q").addEventListener("keydown", e => {
    if (e.key === "Enter") search();
  });
});

// ═══════════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════════
async function load() {
  try {
    const r = await fetch("data.json");
    data = await r.json();
  } catch {
    document.getElementById("status").innerHTML =
      "⚠️ data.json सापडले नाही — हे file HTML सोबत ठेवा.";
  }
}
load();
</script>
</body>
</html>
