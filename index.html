<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🗳 2002 SIR Dhule</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: system-ui, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #1d2671, #c33764);
  min-height: 100vh;
}
.container { max-width: 700px; margin: auto; padding: 12px; }
.header { color: white; text-align: center; margin-top: 20px; padding: 0 10px; }
.header h2 { margin-bottom: 4px; }
.card { background: white; padding: 15px; border-radius: 14px; margin-top: 15px; width: 100%; }
input { width: 100%; padding: 14px; margin-top: 10px; font-size: 16px; border-radius: 10px; border: 1px solid #ddd; }
button {
  width: 100%; padding: 14px; margin-top: 10px; font-size: 16px;
  border-radius: 10px; border: none;
  background: linear-gradient(90deg, #2193b0, #6dd5ed);
  color: white; font-weight: bold; cursor: pointer;
}
button:hover { opacity: 0.9; }
.hint { font-size: 12px; color: #888; margin-top: 8px; text-align: center; line-height: 1.8; }
#count { font-weight: bold; margin-top: 12px; color: #333; min-height: 20px; }
.result { background: #f7f7f7; padding: 12px; margin-top: 10px; border-radius: 10px; border-left: 4px solid #27ae60; }
.result.phonetic { border-left-color: #e67e22; background: #fffaf4; }
.badge { font-size: 11px; color: #555; margin-bottom: 4px; font-weight: bold; }
.text-line { font-size: 15px; line-height: 1.7; }
.file { font-size: 12px; color: #888; margin-top: 4px; }
mark { background: #ffe066; border-radius: 2px; padding: 0 1px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>🗳 2002 SIR Dhule</h2>
    मतदार यादी शोधा
  </div>
  <div class="card">
    <input id="q" placeholder="नाव शोधा — Roman or मराठी दोन्ही चालतात">
    <button onclick="search()">🔍 शोधा / Search</button>
    <div class="hint">
      💡 विनोद = वीनोद &nbsp;|&nbsp; रमेश = रामेश &nbsp;|&nbsp;
      Kazi = Qazi = काजी &nbsp;|&nbsp; Ahmad = Ahmed = अहमद
    </div>
    <div id="count"></div>
    <div id="results"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// STEP 1 — DEVANAGARI VOWEL PAIR NORMALISATION
// Collapse each long/short pair → short form.
// This runs BEFORE Roman conversion so both
// विनोद and वीनोद become identical strings.
//
// Pairs:  अ↔आ  इ↔ई  उ↔ऊ  ए↔ऐ  ओ↔औ
// ═══════════════════════════════════════════════════
function normalizeDevaVowels(str) {
  return str
    .replace(/\u0906/g, '\u0905')  // आ → अ
    .replace(/\u0908/g, '\u0907')  // ई → इ
    .replace(/\u090A/g, '\u0909')  // ऊ → उ
    .replace(/\u0910/g, '\u090F')  // ऐ → ए
    .replace(/\u0914/g, '\u0913')  // औ → ओ
    .replace(/\u0940/g, '\u093F')  // ी → ि
    .replace(/\u0942/g, '\u0941')  // ू → ु
    .replace(/\u0948/g, '\u0947')  // ै → े
    .replace(/\u094C/g, '\u094B'); // ौ → ो
}

// ═══════════════════════════════════════════════════
// STEP 2 — DEVANAGARI → ROMAN
// ═══════════════════════════════════════════════════
const DEVA_MAP = {
  '\u0915':'k','\u0916':'kh','\u0917':'g','\u0918':'gh','\u0919':'ng',
  '\u091A':'ch','\u091B':'chh','\u091C':'j','\u091D':'jh','\u091E':'ny',
  '\u091F':'t','\u0920':'th','\u0921':'d','\u0922':'dh','\u0923':'n',
  '\u0924':'t','\u0925':'th','\u0926':'d','\u0927':'dh','\u0928':'n',
  '\u092A':'p','\u092B':'ph','\u092C':'b','\u092D':'bh','\u092E':'m',
  '\u092F':'y','\u0930':'r','\u0932':'l','\u0935':'v',
  '\u0936':'sh','\u0937':'sh','\u0938':'s','\u0939':'h',
  '\u0933':'l','\u0931':'r',
  '\u0905':'a','\u0907':'i','\u0909':'u','\u090F':'e','\u0913':'o','\u090B':'ri',
  '\u093E':'a','\u093F':'i','\u0941':'u','\u0947':'e','\u094B':'o','\u0943':'ri',
  '\u094D':'','\u0902':'n','\u0903':'h','\u0901':'n','\u093C':'',
  '\u0966':'0','\u0967':'1','\u0968':'2','\u0969':'3','\u096A':'4',
  '\u096B':'5','\u096C':'6','\u096D':'7','\u096E':'8','\u096F':'9',
};
function devaToRoman(str) {
  let out = '';
  for (const ch of str) out += (DEVA_MAP[ch] !== undefined ? DEVA_MAP[ch] : ch);
  return out;
}

// ═══════════════════════════════════════════════════
// STEP 3 — ROMAN VOWEL NORMALISATION
// aa→a  ee/ii→i  oo/uu→u  ai/ei→e  au/ou→o
// So "Raamesh" = "Ramesh", "Veenod" = "Vinod"
// ═══════════════════════════════════════════════════
function normalizeRomanVowels(str) {
  return str
    .replace(/aa/g,'a')
    .replace(/ee|ii/g,'i')
    .replace(/oo|uu/g,'u')
    .replace(/ai|ei/g,'e')
    .replace(/au|ou/g,'o');
}

// ═══════════════════════════════════════════════════
// FULL NORMALISE — combines all 3 steps above
// Produces a clean Roman string with short vowels only
// ═══════════════════════════════════════════════════
function fullNormalize(str) {
  const dv = normalizeDevaVowels(str.toLowerCase());
  const rm = devaToRoman(dv);
  return normalizeRomanVowels(rm);
}

// ═══════════════════════════════════════════════════
// PHONETIC KEY — consonant-only skeleton
//
// Threshold (no false positives for short names):
//   len ≤ 3  → 0 edits  (exact; short skeletons fragile)
//   len 4–6  → 1 edit
//   len 7+   → 2 edits
// ═══════════════════════════════════════════════════
function phoneticKey(word) {
  let s = fullNormalize(word);
  s = s
    .replace(/chh/g,'c').replace(/ch/g,'c')
    .replace(/kh/g,'k') .replace(/gh/g,'g')
    .replace(/ph/g,'f') .replace(/bh/g,'b')
    .replace(/dh/g,'d') .replace(/th/g,'t')
    .replace(/sh/g,'s') .replace(/ng/g,'n')
    .replace(/ny/g,'n') .replace(/ri/g,'r')
    .replace(/q/g,'k').replace(/z/g,'j')
    .replace(/x/g,'ks').replace(/w/g,'v');
  s = s.replace(/[aeiou]/g,'');
  s = s.replace(/[^a-z]/g,'');
  s = s.replace(/(.)\1+/g,'$1');
  return s;
}

function allowedEdits(len) {
  if (len <= 3) return 0;
  if (len <= 6) return 1;
  return 2;
}

// ═══════════════════════════════════════════════════
// LEVENSHTEIN
// ═══════════════════════════════════════════════════
function levenshtein(a, b) {
  if (a === b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  let prev = Array.from({length: b.length+1}, (_,j) => j);
  for (let i = 1; i <= a.length; i++) {
    const curr = [i];
    for (let j = 1; j <= b.length; j++) {
      curr[j] = a[i-1]===b[j-1] ? prev[j-1] : 1+Math.min(prev[j],curr[j-1],prev[j-1]);
    }
    prev = curr;
  }
  return prev[b.length];
}

// ═══════════════════════════════════════════════════
// TOKEN MATCH — does query key match any record word?
// ═══════════════════════════════════════════════════
function tokenMatches(qK, recKeys) {
  if (!qK) return true;
  const thresh = allowedEdits(qK.length);
  for (const rk of recKeys) {
    if (!rk) continue;
    if (Math.abs(qK.length - rk.length) > thresh) continue;
    if (levenshtein(qK, rk) <= thresh) return true;
  }
  return false;
}

// ═══════════════════════════════════════════════════
// LONG-NAME SKELETON MATCH
//
// Fixes compound-name failures where token boundaries
// differ or extra words exist in the record.
//
// Approach: concatenate all token keys into one skeleton
// and slide it over the record's concatenated skeleton.
// If the query skeleton fits as a substring (or nearly),
// it's a match — regardless of word-boundary positions.
//
// Example:
//   Query  "Kazi Shoebuddin" → keys kj+sbdn → "kjsbdn"
//   Record "काजी शेईबुद्दीन मुमवाजोद्दीन"
//          → kj+sbdn+mvjdn  → "kjsbdnmvjdn"
//   "kjsbdn" found in "kjsbdnmvjdn" → ✅ MATCH
// ═══════════════════════════════════════════════════
function longNameMatch(qKeys, recKeys) {
  if (qKeys.length < 2) return false;
  const qSkel = qKeys.join('');
  const rSkel = recKeys.join('');
  if (!qSkel || qSkel.length < 4) return false;

  // Direct containment
  if (rSkel.includes(qSkel)) return true;

  // Sliding window with edits
  const wLen   = qSkel.length;
  const thresh = allowedEdits(wLen);
  if (rSkel.length >= wLen) {
    for (let i = 0; i <= rSkel.length - wLen; i++) {
      if (levenshtein(qSkel, rSkel.slice(i, i + wLen)) <= thresh) return true;
    }
  } else {
    if (levenshtein(qSkel, rSkel) <= allowedEdits(rSkel.length)) return true;
  }
  return false;
}

// ═══════════════════════════════════════════════════
// HIGHLIGHT
// ═══════════════════════════════════════════════════
function highlight(text, terms) {
  let out = text;
  for (const t of terms) {
    if (!t || t.length < 2) continue;
    const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    out = out.replace(re,'<mark>$&</mark>');
  }
  return out;
}

// ═══════════════════════════════════════════════════
// MAIN SEARCH
// ═══════════════════════════════════════════════════
let data = [];

function search() {
  const raw = document.getElementById("q").value.trim();
  if (!raw) return;

  const qTokens      = raw.toLowerCase().split(/\s+/).filter(Boolean);
  const qNormTokens  = qTokens.map(t => fullNormalize(t));
  const qKeys        = qTokens.map(phoneticKey);
  const hasKey       = qKeys.some(k => k.length >= 2);

  const exactList    = [];
  const phoneticList = [];

  data.forEach(rec => {
    const text    = rec.text || '';
    const textLow = text.toLowerCase();

    // Layer 1: exact substring
    if (qTokens.every(t => textLow.includes(t))) {
      exactList.push({ rec, text });
      return;
    }

    const textNorm = fullNormalize(textLow);
    const recWords = textLow.split(/\s+/).filter(Boolean);
    const recKeys  = recWords.map(phoneticKey);

    // Layer 2: vowel-normalised cross-script substring
    // विनोद finds वीनोद, रमेश finds रामेश, Veenod finds वीनोद
    if (qNormTokens.every(nt => nt.length > 1 && textNorm.includes(nt))) {
      phoneticList.push({ rec, text, badge: '🔤 Vowel / Script match' });
      return;
    }

    if (!hasKey) return;

    // Layer 3a: token-by-token phonetic match
    if (qKeys.every(qk => tokenMatches(qk, recKeys))) {
      phoneticList.push({ rec, text, badge: '🔀 Phonetic match' });
      return;
    }

    // Layer 3b: long compound-name skeleton match
    if (longNameMatch(qKeys, recKeys)) {
      phoneticList.push({ rec, text, badge: '🔀 Phonetic match (compound name)' });
    }
  });

  let html = '';

  exactList.forEach(({ rec, text }) => {
    html += `<div class="result">
      <div class="badge">✅ Exact match</div>
      <div class="text-line">${highlight(text, qTokens)}</div>
      <div class="file">${rec.area} | ${rec.file} (line ${rec.line})</div>
    </div>`;
  });

  phoneticList.forEach(({ rec, text, badge }) => {
    html += `<div class="result phonetic">
      <div class="badge">${badge}</div>
      <div class="text-line">${text}</div>
      <div class="file">${rec.area} | ${rec.file} (line ${rec.line})</div>
    </div>`;
  });

  const total = exactList.length + phoneticList.length;

  document.getElementById("results").innerHTML = html ||
    `<p style="color:#999;margin-top:14px;text-align:center">
       कोणतेही परिणाम सापडले नाहीत / No results found
     </p>`;

  document.getElementById("count").innerHTML =
    `Found <b>${total}</b> result${total!==1?'s':''}
     — ${exactList.length} exact, ${phoneticList.length} phonetic
     — for "<i>${raw}</i>"`;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById("q").addEventListener("keydown", e => {
    if (e.key === "Enter") search();
  });
});

// ═══════════════════════════════════════════════════
// LOAD  (no "Total records" shown)
// ═══════════════════════════════════════════════════
async function load() {
  try {
    const r = await fetch("data.json");
    data = await r.json();
  } catch {
    document.getElementById("count").innerHTML =
      "⚠️ data.json not found — place it in the same folder as this file.";
  }
}
load();
</script>
</body>
</html>
