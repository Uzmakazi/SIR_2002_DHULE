<!DOCTYPE html>
<html lang="mr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🗳 2002 SIR Dhule</title>

<style>

body{
  font-family: system-ui;
  margin:0;
  background:linear-gradient(135deg,#1d2671,#c33764);
}

.container{
  max-width:700px;
  margin:auto;
  padding:12px;
}

.header{
  color:white;
  text-align:center;
  margin-top:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:14px;
  margin-top:15px;
}

input,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  background:linear-gradient(90deg,#2193b0,#6dd5ed);
  color:white;
  font-weight:bold;
  border:none;
}

.result{
  background:#f7f7f7;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
}

.file{
  font-size:12px;
  color:#666;
}

mark{
  background:yellow;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>🗳 2002 SIR Dhule</h2>
मतदार यादी शोधा
</div>

<div class="card">

<input id="q" placeholder=" आडनाव + स्वतःचे नाव ">

<button onclick="search()">🔍 शोधा</button>

<div id="count"></div>
<div id="results"></div>

</div>

</div>

<!-- ✅ SCRIPT AT BOTTOM (IMPORTANT) -->
<script>

let data=[];

// ✅ normalize
function normalize(str){
  return str.toLowerCase()
    .replace(/[^a-zअ-ह\s]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

// ✅ simple transliteration
function transliterate(word){
  return word
    .toLowerCase()
    .replace(/q/g,"क")
    .replace(/k/g,"क")
    .replace(/z/g,"ज")
    .replace(/f/g,"फ")
    .replace(/d/g,"द")
    .replace(/t/g,"त")
    .replace(/m/g,"म")
    .replace(/n/g,"न")
    .replace(/a/g,"अ")
    .replace(/e/g,"े")
    .replace(/i/g,"ि")
    .replace(/o/g,"ो")
    .replace(/u/g,"ु");
}

// ✅ simple fuzzy match
function similar(a,b){
  if(!a || !b) return false;

  if(a.includes(b) || b.includes(a)) return true;

  let diff = Math.abs(a.length - b.length);
  return diff <= 2;
}

// ✅ smart match
function isMatch(text, query){

  text = normalize(text);
  query = normalize(query);

  let words = query.split(" ");

  return words.every(qWord=>{

    let mar = transliterate(qWord);

    return text.split(" ").some(tWord=>{
      return (
        similar(tWord,qWord) ||
        similar(tWord,mar)
      );
    });

  });
}

// 🎨 highlight
function highlight(text,query){
  let words = query.split(" ");
  words.forEach(w=>{
    let reg = new RegExp(w,"gi");
    text = text.replace(reg,"<mark>"+w+"</mark>");
  });
  return text;
}

// 📦 load data
async function load(){
  try{
    let r = await fetch("data.json");
    data = await r.json();

    let countEl = document.getElementById("count");

    if(countEl){
      countEl.innerHTML = "Total records: " + data.length;
    }

  }catch(e){
    console.error("ERROR loading JSON:", e);
    document.getElementById("count").innerHTML = "❌ data.json load error";
  }
}

// 🔍 search
function search(){

  let q = document.getElementById("q").value;

  if(!q){
    document.getElementById("results").innerHTML="";
    return;
  }

  let html="";
  let total=0;

  data.forEach(r=>{

    if(isMatch(r.text,q)){
      total++;

      html += `
      <div class="result">
        <div>${highlight(r.text,q)}</div>
        <div class="file">
          ${r.area} | ${r.file} (line ${r.line})
        </div>
      </div>`;
    }

  });

  document.getElementById("results").innerHTML=html;
  document.getElementById("count").innerHTML="Found "+total+" results";
}

// ✅ load after page ready
document.addEventListener("DOMContentLoaded", load);

</script>

</body>
</html>
