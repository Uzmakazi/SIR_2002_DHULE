<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🗳 2002 SIR Dhule</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: system-ui, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #1d2671, #c33764);
  min-height: 100vh;
}
.container {
  max-width: 700px;
  margin: auto;
  padding: 12px;
}
.header {
  color: white;
  text-align: center;
  margin-top: 20px;
  padding: 0 10px;
}
.header h2 { margin-bottom: 4px; }
.card {
  background: white;
  padding: 15px;
  border-radius: 14px;
  margin-top: 15px;
  width: 100%;
}
input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #ddd;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #2193b0, #6dd5ed);
  color: white;
  font-weight: bold;
  cursor: pointer;
}
button:hover { opacity: 0.9; }
.hint {
  font-size: 12px;
  color: #888;
  margin-top: 8px;
  text-align: center;
}
#count {
  font-weight: bold;
  margin-top: 12px;
  color: #333;
  min-height: 20px;
}
.result {
  background: #f7f7f7;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border-left: 4px solid #2193b0;
}
.result.fuzzy {
  border-left-color: #e67e22;
  background: #fffaf5;
}
.badge {
  font-size: 11px;
  color: #555;
  margin-bottom: 5px;
  font-weight: bold;
}
.text-line {
  font-size: 15px;
  line-height: 1.6;
}
.file {
  font-size: 12px;
  color: #777;
  margin-top: 5px;
}
mark {
  background: #ffe066;
  border-radius: 2px;
  padding: 0 1px;
}
.phonetic-debug {
  font-size: 10px;
  color: #aaa;
  margin-top: 3px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>🗳 2002 SIR Dhule </h2>
    मतदार यादी शोधा
  </div>
  <div class="card">
    <input id="q" placeholder="नाव शोधा — Roman or मराठी दोन्ही चालतात">
    <button onclick="search()">🔍 शोधा / Search</button>
    <div class="hint">
      💡 Fuzzy + Phonetic search: Kazi = Qazi = काजी &nbsp;|&nbsp; Ahmad = Ahmed = अहमद
    </div>
    <div id="count"></div>
    <div id="results"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  DEVANAGARI → ROMAN TRANSLITERATION TABLE
// ═══════════════════════════════════════════════════════════════
const DEVA = {
  // Consonants
  'क':'k', 'ख':'kh', 'ग':'g',  'घ':'gh', 'ङ':'ng',
  'च':'ch','छ':'chh','ज':'j',  'झ':'jh', 'ञ':'ny',
  'ट':'t', 'ठ':'th', 'ड':'d',  'ढ':'dh', 'ण':'n',
  'त':'t', 'थ':'th', 'द':'d',  'ध':'dh', 'न':'n',
  'प':'p', 'फ':'ph', 'ब':'b',  'भ':'bh', 'म':'m',
  'य':'y', 'र':'r',  'ल':'l',  'व':'v',
  'श':'sh','ष':'sh', 'स':'s',  'ह':'h',
  'ळ':'l', 'ऱ':'r',
  // Independent vowels
  'अ':'a', 'आ':'aa', 'इ':'i', 'ई':'i',  'उ':'u', 'ऊ':'u',
  'ए':'e', 'ऐ':'e',  'ओ':'o', 'औ':'o',  'ऋ':'ri',
  // Vowel signs (matras)
  'ा':'a', 'ि':'i',  'ी':'i', 'ु':'u',  'ू':'u',
  'े':'e', 'ै':'e',  'ो':'o', 'ौ':'o',  'ृ':'ri',
  // Modifiers
  '्':'', 'ं':'n', 'ः':'h', 'ँ':'n', '़':'',
  // Devanagari digits
  '०':'0','१':'1','२':'2','३':'3','४':'4',
  '५':'5','६':'6','७':'7','८':'8','९':'9',
};

function devaToRoman(text) {
  let out = '';
  for (const ch of text) {
    out += (DEVA[ch] !== undefined) ? DEVA[ch] : ch;
  }
  return out;
}

// ═══════════════════════════════════════════════════════════════
//  PHONETIC KEY  — consonant skeleton after normalising sounds
//  Works on BOTH Roman input AND Devanagari (converts first)
// ═══════════════════════════════════════════════════════════════
function phoneticKey(word) {
  // 1. Romanise any Devanagari
  let s = devaToRoman(word.toLowerCase());

  // 2. Merge phonetically similar consonant clusters
  s = s
    .replace(/q/g,   'k')   // q  → k  (Qazi = Kazi)
    .replace(/z/g,   'j')   // z  → j  (Rashid→Rashid, Rasheed fine)
    .replace(/x/g,  'ks')   // x  → ks
    .replace(/sh/g,  's')   // sh → s  (Sheikh = Seikh-ish)
    .replace(/ch/g,  'c')   // ch → c
    .replace(/kh/g,  'k')   // kh → k
    .replace(/gh/g,  'g')   // gh → g
    .replace(/ph/g,  'f')   // ph → f
    .replace(/bh/g,  'b')   // bh → b
    .replace(/dh/g,  'd')   // dh → d
    .replace(/th/g,  't')   // th → t
    .replace(/ng/g,  'n')   // ng → n
    .replace(/ny/g,  'n')   // ny → n
    .replace(/w/g,   'v');  // w  → v

  // 3. Strip ALL vowels → pure consonant skeleton
  //    This makes Ahmad / Ahmed / Ahmud / Ahemad all → HMD
  s = s.replace(/[aeiou]/g, '');

  // 4. Keep only alpha
  s = s.replace(/[^a-z]/g, '');

  // 5. Collapse consecutive duplicate letters  (dddn → dn)
  s = s.replace(/(.)\1+/g, '$1');

  return s;
}

// ═══════════════════════════════════════════════════════════════
//  LEVENSHTEIN DISTANCE  (edit distance between two strings)
// ═══════════════════════════════════════════════════════════════
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  // Use two-row rolling array for memory efficiency
  let prev = Array.from({length: n + 1}, (_, j) => j);
  for (let i = 1; i <= m; i++) {
    const curr = [i];
    for (let j = 1; j <= n; j++) {
      curr[j] = a[i-1] === b[j-1]
        ? prev[j-1]
        : 1 + Math.min(prev[j], curr[j-1], prev[j-1]);
    }
    prev = curr;
  }
  return prev[n];
}

// ═══════════════════════════════════════════════════════════════
//  FUZZY TOKEN MATCH
//  Checks if a query phonetic key is close enough to any
//  of the record's word keys
// ═══════════════════════════════════════════════════════════════
function fuzzyTokenMatch(qKey, recKeys) {
  if (!qKey) return false;
  // Allowed edit distance grows with key length:
  //   len 1–2 → 0 (exact only), 3–5 → 1, 6+ → 2
  const threshold = qKey.length < 3 ? 0 : qKey.length < 6 ? 1 : 2;
  for (const rk of recKeys) {
    if (!rk) continue;
    if (levenshtein(qKey, rk) <= threshold) return true;
  }
  return false;
}

// ═══════════════════════════════════════════════════════════════
//  HIGHLIGHT helper  (only for direct/exact matches)
// ═══════════════════════════════════════════════════════════════
function highlight(text, words) {
  let out = text;
  for (const w of words) {
    if (!w || w.length < 2) continue;
    const re = new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    out = out.replace(re, '<mark>$&</mark>');
  }
  return out;
}

// ═══════════════════════════════════════════════════════════════
//  MAIN SEARCH
// ═══════════════════════════════════════════════════════════════
let data = [];

function search() {
  const raw = document.getElementById("q").value.trim();
  if (!raw) return;

  // Tokenise query
  const qTokens = raw.toLowerCase().split(/\s+/).filter(Boolean);
  const qKeys   = qTokens.map(phoneticKey);
  // Also romanise each token (helps when user types Devanagari)
  const qRomanTokens = qTokens.map(t => devaToRoman(t));

  const exact   = [];
  const phonetic = [];

  data.forEach(r => {
    const text    = r.text || '';
    const textLow = text.toLowerCase();

    // Pre-compute record's word list and their phonetic keys
    const recWords = textLow.split(/\s+/).filter(Boolean);
    const recKeys  = recWords.map(phoneticKey);
    const recRoman = devaToRoman(textLow); // full line romanised

    // ── Test 1: direct substring (original script) ────────────
    const isExact = qTokens.every(t => textLow.includes(t));

    if (isExact) {
      exact.push({ r, text });
      return;
    }

    // ── Test 2: roman substring (user types Devanagari,
    //           record stored in Roman, or vice-versa) ─────────
    const isRomanMatch = qRomanTokens.every(rt =>
      rt.length > 1 && recRoman.includes(rt)
    );

    if (isRomanMatch) {
      phonetic.push({ r, text, reason: 'script-match' });
      return;
    }

    // ── Test 3: phonetic / fuzzy — every query token must
    //           fuzzily match some word in the record ──────────
    const isPhonetic = qKeys.every(qk => {
      if (!qk) return true;
      return fuzzyTokenMatch(qk, recKeys);
    });

    if (isPhonetic) {
      phonetic.push({ r, text, reason: 'phonetic' });
    }
  });

  // Render — exact first, then phonetic
  let html = '';
  const total = exact.length + phonetic.length;

  exact.forEach(({ r, text }) => {
    html += `
      <div class="result">
        <div class="badge">✅ Exact match</div>
        <div class="text-line">${highlight(text, qTokens)}</div>
        <div class="file">${r.area} | ${r.file} (line ${r.line})</div>
      </div>`;
  });

  phonetic.forEach(({ r, text }) => {
    html += `
      <div class="result fuzzy">
        <div class="badge">🔀 Phonetic / Fuzzy match</div>
        <div class="text-line">${text}</div>
        <div class="file">${r.area} | ${r.file} (line ${r.line})</div>
      </div>`;
  });

  document.getElementById("results").innerHTML =
    html || `<p style="color:#888;margin-top:12px">
      कोणतेही परिणाम सापडले नाहीत / No results found
    </p>`;

  document.getElementById("count").innerHTML =
    `Found <b>${total}</b> results
     &nbsp;(${exact.length} exact, ${phonetic.length} phonetic)
     &nbsp;for "<i>${raw}</i>"`;
}

// Enter key triggers search
document.getElementById && document.addEventListener('DOMContentLoaded', () => {
  document.getElementById("q").addEventListener("keydown", e => {
    if (e.key === "Enter") search();
  });
});

// ═══════════════════════════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════════════════════════
async function load() {
  try {
    const r = await fetch("data.json");
    data = await r.json();
    document.getElementById("count").innerHTML =
      "Total records: <b>" + data.length + "</b>";
  } catch(e) {
    document.getElementById("count").innerHTML =
      "⚠️ data.json not found. Place it in the same folder.";
  }
}
load();
</script>
</body>
</html>
