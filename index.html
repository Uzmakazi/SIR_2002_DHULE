<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🗳 2002 SIR Dhule</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: system-ui, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #1d2671, #c33764);
  min-height: 100vh;
}
.container { max-width: 700px; margin: auto; padding: 12px; }
.header { color: white; text-align: center; margin-top: 20px; padding: 0 10px; }
.header h2 { margin-bottom: 4px; }
.card { background: white; padding: 15px; border-radius: 14px; margin-top: 15px; width: 100%; }
input {
  width: 100%; padding: 14px; margin-top: 10px; font-size: 16px;
  border-radius: 10px; border: 1px solid #ddd;
}
button {
  width: 100%; padding: 14px; margin-top: 10px; font-size: 16px;
  border-radius: 10px; border: none;
  background: linear-gradient(90deg, #2193b0, #6dd5ed);
  color: white; font-weight: bold; cursor: pointer;
}
button:hover { opacity: 0.9; }
.hint { font-size: 12px; color: #888; margin-top: 8px; text-align: center; line-height: 1.6; }
#count { font-weight: bold; margin-top: 12px; color: #333; min-height: 20px; }
.result {
  background: #f7f7f7; padding: 12px; margin-top: 10px;
  border-radius: 10px; border-left: 4px solid #27ae60;
}
.result.phonetic { border-left-color: #e67e22; background: #fffaf4; }
.badge { font-size: 11px; color: #555; margin-bottom: 4px; font-weight: bold; }
.text-line { font-size: 15px; line-height: 1.7; }
.file { font-size: 12px; color: #888; margin-top: 4px; }
mark { background: #ffe066; border-radius: 2px; padding: 0 1px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>🗳 2002 SIR Dhule </h2>
    मतदार यादी शोधा
  </div>
  <div class="card">
    <input id="q" placeholder="नाव शोधा — Roman or मराठी दोन्ही चालतात">
    <button onclick="search()">🔍 शोधा / Search</button>
    <div class="hint">
      💡 Kazi = Qazi = काजी &nbsp;|&nbsp; Ahmad = Ahmed = अहमद &nbsp;|&nbsp; राशिद = रशीद
    </div>
    <div id="count"></div>
    <div id="results"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
//  DEVANAGARI → ROMAN
// ─────────────────────────────────────────────────────────────
const DEVA_MAP = {
  'क':'k','ख':'kh','ग':'g','घ':'gh','ङ':'ng',
  'च':'ch','छ':'chh','ज':'j','झ':'jh','ञ':'ny',
  'ट':'t','ठ':'th','ड':'d','ढ':'dh','ण':'n',
  'त':'t','थ':'th','द':'d','ध':'dh','न':'n',
  'प':'p','फ':'ph','ब':'b','भ':'bh','म':'m',
  'य':'y','र':'r','ल':'l','व':'v',
  'श':'sh','ष':'sh','स':'s','ह':'h',
  'ळ':'l','ऱ':'r',
  'अ':'a','आ':'aa','इ':'i','ई':'i','उ':'u','ऊ':'u',
  'ए':'e','ऐ':'e','ओ':'o','औ':'o','ऋ':'ri',
  'ा':'a','ि':'i','ी':'i','ु':'u','ू':'u',
  'े':'e','ै':'e','ो':'o','ौ':'o','ृ':'ri',
  '्':'','ं':'n','ः':'h','ँ':'n','़':'',
  '०':'0','१':'1','२':'2','३':'3','४':'4',
  '५':'5','६':'6','७':'7','८':'8','९':'9',
};

function devaToRoman(str) {
  let out = '';
  for (const ch of str) out += (DEVA_MAP[ch] ?? ch);
  return out;
}

// ─────────────────────────────────────────────────────────────
//  PHONETIC KEY  → pure consonant skeleton
//
//  Ahmad / Ahmed / Ahemad / अहमद  → all produce "hmd"
//  राशिद / रशीद                  → both produce "rsd"
//  Kazi / Qazi / काजी             → all produce "kj"
// ─────────────────────────────────────────────────────────────
function phoneticKey(word) {
  let s = devaToRoman(word.toLowerCase());

  // Normalise consonant clusters (longest patterns first)
  s = s
    .replace(/chh/g,'c').replace(/ch/g,'c')
    .replace(/kh/g,'k') .replace(/gh/g,'g')
    .replace(/ph/g,'f') .replace(/bh/g,'b')
    .replace(/dh/g,'d') .replace(/th/g,'t')
    .replace(/sh/g,'s') .replace(/ng/g,'n')
    .replace(/ny/g,'n') .replace(/ri/g,'r')
    .replace(/q/g,'k')   // Qazi = Kazi
    .replace(/z/g,'j')   // Rashid = Rasheed = Rashiid
    .replace(/x/g,'ks')
    .replace(/w/g,'v');

  s = s.replace(/[aeiou]/g, '');  // strip all vowels
  s = s.replace(/[^a-z]/g, '');   // keep only a-z
  s = s.replace(/(.)\1+/g, '$1'); // collapse runs: ddn → dn

  return s;
}

// ─────────────────────────────────────────────────────────────
//  THRESHOLD  ← THE CRITICAL FIX
//
//  OLD (buggy): len < 6 → 1   ← gave threshold=1 for 3-char
//               keys, so rjs~rms~rjn (राजेश matched रमेश, रजनी!)
//
//  NEW (correct):
//    len ≤ 3  → 0   exact only (short skeletons are fragile)
//    len 4–6  → 1   one consonant may differ
//    len 7+   → 2   two consonants may differ (long compound names)
//
//  Verification:
//    राजेश→"rjs"(3)  vs रमेश→"rms"  dist=1  thresh=0 → NO MATCH ✅
//    राजेश→"rjs"(3)  vs रजनी→"rjn"  dist=1  thresh=0 → NO MATCH ✅
//    राजेश→"rjs"(3)  vs राजु→"rj"   dist=1  thresh=0 → NO MATCH ✅
//    Ahmad→"hmd"(3)  vs Ahmed→"hmd"  dist=0  thresh=0 → MATCH    ✅
//    Mumtazoddin→"mtjdn"(5) vs Mumvajoddin→"mvjdn" dist=1 thresh=1→MATCH ✅
// ─────────────────────────────────────────────────────────────
function allowedEdits(keyLen) {
  if (keyLen <= 3) return 0;
  if (keyLen <= 6) return 1;
  return 2;
}

// ─────────────────────────────────────────────────────────────
//  LEVENSHTEIN DISTANCE
// ─────────────────────────────────────────────────────────────
function levenshtein(a, b) {
  if (a === b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  let prev = Array.from({length: b.length + 1}, (_, j) => j);
  for (let i = 1; i <= a.length; i++) {
    const curr = [i];
    for (let j = 1; j <= b.length; j++) {
      curr[j] = a[i-1] === b[j-1]
        ? prev[j-1]
        : 1 + Math.min(prev[j], curr[j-1], prev[j-1]);
    }
    prev = curr;
  }
  return prev[b.length];
}

// ─────────────────────────────────────────────────────────────
//  TOKEN MATCHER
//  Does query key qK match any word key in the record?
//  Length-difference guard: skip record keys that are too
//  different in length to ever match within the threshold.
// ─────────────────────────────────────────────────────────────
function tokenMatches(qK, recKeys) {
  if (!qK) return true;
  const thresh = allowedEdits(qK.length);
  for (const rk of recKeys) {
    if (!rk) continue;
    if (Math.abs(qK.length - rk.length) > thresh) continue; // fast skip
    if (levenshtein(qK, rk) <= thresh) return true;
  }
  return false;
}

// ─────────────────────────────────────────────────────────────
//  HIGHLIGHT
// ─────────────────────────────────────────────────────────────
function highlight(text, terms) {
  let out = text;
  for (const t of terms) {
    if (!t || t.length < 2) continue;
    const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    out = out.replace(re, '<mark>$&</mark>');
  }
  return out;
}

// ─────────────────────────────────────────────────────────────
//  SEARCH
// ─────────────────────────────────────────────────────────────
let data = [];

function search() {
  const raw = document.getElementById("q").value.trim();
  if (!raw) return;

  const qTokens    = raw.toLowerCase().split(/\s+/).filter(Boolean);
  const qKeys      = qTokens.map(phoneticKey);
  const qRomTokens = qTokens.map(t => devaToRoman(t));

  // At least one key must be non-trivial (≥ 2 chars) to run phonetic search
  const hasSubstantialKey = qKeys.some(k => k.length >= 2);

  const exactList    = [];
  const phoneticList = [];

  data.forEach(rec => {
    const text    = rec.text || '';
    const textLow = text.toLowerCase();

    // Layer 1: direct substring in original script
    if (qTokens.every(t => textLow.includes(t))) {
      exactList.push({ rec, text });
      return;
    }

    // Precompute record word keys
    const recWords = textLow.split(/\s+/).filter(Boolean);
    const recKeys  = recWords.map(phoneticKey);
    const textRom  = devaToRoman(textLow);

    // Layer 2: romanised cross-script substring
    if (qRomTokens.every(rt => rt.length > 1 && textRom.includes(rt))) {
      phoneticList.push({ rec, text, badge: '🔤 Script match' });
      return;
    }

    // Layer 3: phonetic / fuzzy — every query token must match some record word
    if (hasSubstantialKey && qKeys.every(qk => tokenMatches(qk, recKeys))) {
      phoneticList.push({ rec, text, badge: '🔀 Phonetic / Fuzzy match' });
    }
  });

  // Render
  let html = '';

  exactList.forEach(({ rec, text }) => {
    html += `
      <div class="result">
        <div class="badge">✅ Exact match</div>
        <div class="text-line">${highlight(text, qTokens)}</div>
        <div class="file">${rec.area} | ${rec.file} (line ${rec.line})</div>
      </div>`;
  });

  phoneticList.forEach(({ rec, text, badge }) => {
    html += `
      <div class="result phonetic">
        <div class="badge">${badge}</div>
        <div class="text-line">${text}</div>
        <div class="file">${rec.area} | ${rec.file} (line ${rec.line})</div>
      </div>`;
  });

  const total = exactList.length + phoneticList.length;

  document.getElementById("results").innerHTML = html ||
    `<p style="color:#999;margin-top:14px;text-align:center">
       कोणतेही परिणाम सापडले नाहीत / No results found
     </p>`;

  document.getElementById("count").innerHTML =
    `Found <b>${total}</b> result${total !== 1 ? 's' : ''}
     (${exactList.length} exact, ${phoneticList.length} phonetic)
     for "<i>${raw}</i>"`;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById("q").addEventListener("keydown", e => {
    if (e.key === "Enter") search();
  });
});

// ─────────────────────────────────────────────────────────────
//  LOAD DATA
// ─────────────────────────────────────────────────────────────
async function load() {
  try {
    const r = await fetch("data.json");
    data = await r.json();
    document.getElementById("count").innerHTML =
      "Total records: <b>" + data.length + "</b>";
  } catch {
    document.getElementById("count").innerHTML =
      "⚠️ data.json not found — place it in the same folder as this HTML file.";
  }
}
load();
</script>
</body>
</html>
