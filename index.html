<script>

let data=[];

// 🔤 basic transliteration mapping
const map = {
  a:"अ", aa:"आ", i:"इ", ee:"ई", u:"उ", oo:"ऊ",
  e:"ए", ai:"ऐ", o:"ओ", au:"औ",
  k:"क", kh:"ख", g:"ग", gh:"घ",
  ch:"च", j:"ज", zh:"झ",
  t:"त", th:"थ", d:"द", dh:"ध",
  n:"न", p:"प", ph:"फ", b:"ब", bh:"भ",
  m:"म", y:"य", r:"र", l:"ल", v:"व",
  s:"स", h:"ह"
};

// 🔁 normalize text (important)
function normalize(str){
  return str.toLowerCase()
    .replace(/[^a-zअ-ह\s]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

// 🔤 English → rough Marathi conversion
function transliterate(word){
  let w = word.toLowerCase();
  let result = "";

  for(let i=0;i<w.length;i++){
    let two = w.substr(i,2);
    if(map[two]){
      result += map[two];
      i++;
    }else if(map[w[i]]){
      result += map[w[i]];
    }else{
      result += w[i];
    }
  }

  return result;
}

// 🔍 Levenshtein distance (fuzzy match)
function distance(a,b){
  let m=[];
  for(let i=0;i<=b.length;i++){m[i]=[i];}
  for(let j=0;j<=a.length;j++){m[0][j]=j;}

  for(let i=1;i<=b.length;i++){
    for(let j=1;j<=a.length;j++){
      m[i][j]=b.charAt(i-1)==a.charAt(j-1)
        ? m[i-1][j-1]
        : Math.min(
            m[i-1][j-1]+1,
            m[i][j-1]+1,
            m[i-1][j]+1
          );
    }
  }

  return m[b.length][a.length];
}

// 🎯 smart match
function isMatch(text, query){

  text = normalize(text);
  query = normalize(query);

  let words = query.split(" ");

  return words.every(qWord=>{
    
    let marathi = transliterate(qWord);

    return text.split(" ").some(tWord=>{
      return (
        tWord.includes(qWord) ||
        tWord.includes(marathi) ||
        distance(tWord, qWord) <= 2 ||
        distance(tWord, marathi) <= 2
      );
    });

  });
}

// 🎨 highlight
function highlight(text,query){
  let q = query.split(" ");
  q.forEach(word=>{
    let reg = new RegExp(word,"gi");
    text = text.replace(reg, m=>`<mark>${m}</mark>`);
  });
  return text;
}

// 📦 load data
async function load(){
  let r = await fetch("data.json");
  data = await r.json();
  document.getElementById("count")
    .innerHTML="Total records: "+data.length;
}

// 🔍 SEARCH
function search(){

  let q = document.getElementById("q").value;

  let html="";
  let total=0;

  data.forEach(r=>{

    if(isMatch(r.text,q)){
      total++;

      html+=`
      <div class="result">
        <div>${highlight(r.text,q)}</div>
        <div class="file">
          ${r.area} | ${r.file} (line ${r.line})
        </div>
      </div>
      `;
    }

  });

  document.getElementById("results").innerHTML=html;
  document.getElementById("count")
    .innerHTML="Found "+total+" results";
}

load();

</script>
